name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: AtlasReaper311/atlas-infra/.github/workflows/deploy-worker.yml@61708c4dc639d2544a1a5e7063efcccdf96988cc # atlas-infra main
    with:
      worker_name: ramone-trigger
      working_directory: worker
      run_lint: true
      run_tests: false
    secrets: inherit
